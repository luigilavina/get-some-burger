<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get some Burguer - Login</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/login.css">
    <link rel="icon" type="image/x-icon" href="./imagens/favicon.png">
    <script src="./js/login.js" defer></script>
</head>

<body>
    <header>
        <a href="./index.html">
            <img src="./imagens/Logo.png" alt="Logo Get Some Burger">
        </a>

        <nav>
            <ul>
                <li>
                    <a href="./login.html" class="icon-admin">
                        <img src="./imagens/iconUsuario.png" alt="Login">
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <main class="login-container">

        <form class="login-form" id="loginForm">
            <h2>Login</h2>

            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="Digite seu email" required>
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>

            <p class="cadastro-texto">Não possui conta?</p>

            <a href="./cadastro.html" class="btn-cadastro">
                Cadastre-se
            </a>
        </form>
    </main>
</body>

</html>
